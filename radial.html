<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Radial Explorer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── Pastel dark (dusty dusk) ── */
:root {
  color-scheme: dark;
  --bg:       #241E2A;
  --surface:  #2E2638;
  --surface2: #3C3248;
  --text:     #F4EEFF;
  --muted:    #A090B8;
  --accent:   #C9A0C0;
  --accent2:  #DDB8D8;
  --border:   #4A3E5A;
  --blue:     #98B0D4;
  --shadow:   rgba(0,0,0,.5);
  --btn-on:   #3C3248;
  --btn-on-t: #F4EEFF;
  --btn-off-t:#706088;
  --inp-bg:   #1C1824;
  --scrollt:  #4A3E5A;
}
/* ── Pastel light (soft bloom) ── */
[data-theme="light"] {
  color-scheme: light;
  --bg:       #FDF4F8;
  --surface:  #FFF8FC;
  --surface2: #F4E4EE;
  --text:     #2E1A28;
  --muted:    #8A607A;
  --accent:   #C47898;
  --accent2:  #D898B0;
  --border:   #E8C8D8;
  --blue:     #88A8C8;
  --shadow:   rgba(60,20,50,.15);
  --btn-on:   #F4E4EE;
  --btn-on-t: #2E1A28;
  --btn-off-t:#9A7888;
  --inp-bg:   #FFFAFE;
  --scrollt:  #E8C8D8;
}

body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
  transition:background .3s,color .3s;
}

/* Loading */
#loading{
  position:fixed;inset:0;background:var(--bg);z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;
  transition:opacity .5s;
}
#loading.out{opacity:0;pointer-events:none}
.pball{width:58px;height:58px;border-radius:50%;position:relative;animation:spin 1.1s linear infinite}
.pball-t{position:absolute;top:0;left:0;right:0;height:29px;background:#e53935;border-radius:29px 29px 0 0;border:4px solid #2A1408;border-bottom:none}
.pball-b{position:absolute;bottom:0;left:0;right:0;height:29px;background:#f5f5f5;border-radius:0 0 29px 29px;border:4px solid #2A1408;border-top:none}
.pball-m{position:absolute;top:50%;left:0;right:0;height:7px;background:#2A1408;transform:translateY(-50%)}
.pball-c{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:17px;height:17px;background:#fff;border-radius:50%;border:4px solid #2A1408;z-index:1}
@keyframes spin{to{transform:rotate(360deg)}}
#prog-text{font-size:.88rem;color:var(--muted);letter-spacing:.02em}
#prog-wrap{width:230px;height:6px;background:var(--border);border-radius:99px;overflow:hidden}
#prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .12s;border-radius:99px}

/* Layout */
#app{display:flex;flex:1;overflow:hidden}

/* Sidebar */
#sidebar{
  width:240px;flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;
  padding:.85rem .75rem 1rem;display:flex;flex-direction:column;gap:.85rem;
  transition:background .3s,border-color .3s;
}

/* Sidebar header row: title + theme toggle */
.sidebar-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem}
#sidebar-title{
  font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);font-weight:600;
}
#theme-toggle{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:.2rem .5rem;font-size:.73rem;cursor:pointer;
  transition:background .15s,color .15s;white-space:nowrap;line-height:1.4;
}
#theme-toggle:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}

#search-box{
  width:100%;background:var(--inp-bg);border:1.5px solid var(--border);
  color:var(--text);border-radius:10px;padding:.42rem .7rem;font-size:.82rem;
  transition:border-color .15s,background .3s;outline:none;
}
#search-box::placeholder{color:var(--muted)}
#search-box:focus{border-color:var(--accent)}

.filter-section{display:flex;flex-direction:column;gap:.45rem}
.filter-label{
  font-size:.66rem;text-transform:uppercase;letter-spacing:.12em;
  color:var(--muted);font-weight:800;
}

.gen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.gen-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:5px;padding:.28rem 0;font-size:.74rem;cursor:pointer;
  transition:background .12s,color .12s;text-align:center;font-weight:500;
}
.gen-btn.on{background:var(--surface2);color:var(--text);border-color:var(--border);font-weight:600}
.gen-btn:hover:not(.on){background:var(--surface2);color:var(--text)}

.type-grid{display:flex;flex-wrap:wrap;gap:4px}
.type-btn{
  border:none;border-radius:5px;padding:.22rem .48rem;font-size:.63rem;
  font-weight:700;cursor:pointer;opacity:.28;transition:opacity .15s;
  color:white;text-shadow:0 1px 2px rgba(0,0,0,.4);text-transform:uppercase;letter-spacing:.04em;
}
.type-btn.on{opacity:1}
.type-btn:hover{opacity:.75}
.type-btn.on:hover{opacity:.88}

.rarity-group{display:flex;flex-direction:column;gap:4px}
.rarity-btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:5px;padding:.3rem .65rem;font-size:.78rem;cursor:pointer;
  transition:background .12s,color .12s;text-align:left;font-weight:500;
}
.rarity-btn.on{background:var(--surface2);color:var(--text);font-weight:600}
.rarity-btn:hover:not(.on){background:var(--surface2);color:var(--text)}

.slider-row{display:flex;align-items:center;gap:.55rem}
#bst-slider{flex:1;accent-color:var(--accent);cursor:pointer}
#bst-val{
  font-size:.76rem;color:var(--text);min-width:30px;text-align:right;
  font-weight:700;
}

#reset-btn{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:5px;padding:.4rem;font-size:.78rem;cursor:pointer;font-weight:500;
  transition:background .12s;letter-spacing:.01em;width:100%;
}
#reset-btn:hover{background:var(--border)}

/* Legend */
#legend{
  margin-top:auto;padding-top:.75rem;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:.45rem;
}
.legend-size{display:flex;align-items:center;gap:.45rem;font-size:.7rem;color:var(--muted)}
.sz-dot{border-radius:50%;background:var(--muted);flex-shrink:0}

/* Chart area */
#chart-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:background .3s}
#ctr-circle{transition:fill .3s,stroke .3s}
#chart{width:100%;height:100%;max-width:min(100%,100vh - 4px)}

/* SVG point */
.pt{transition:opacity .25s,r .15s;cursor:pointer}
.pt.dim{opacity:.055!important}

/* Tooltip */
#tooltip{
  position:fixed;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:.8rem;width:218px;pointer-events:none;
  z-index:1000;opacity:0;transform:translateY(6px);
  transition:opacity .13s,transform .13s;
}
#tooltip.vis{opacity:1;transform:translateY(0) scale(1)}
.tt-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.tt-head img{width:58px;height:58px;image-rendering:pixelated;flex-shrink:0;
  border-radius:8px;background:var(--inp-bg);padding:2px}
.tt-head h3{font-size:.92rem;text-transform:capitalize;line-height:1.2;font-weight:700}
.tt-meta{font-size:.67rem;color:var(--muted);margin-top:3px}
.tt-types{display:flex;gap:.3rem;flex-wrap:wrap;margin-bottom:.45rem}
.tbadge{
  padding:.13rem .48rem;border-radius:6px;font-size:.63rem;font-weight:800;
  text-transform:uppercase;color:white;text-shadow:0 1px 2px rgba(0,0,0,.4);
  letter-spacing:.03em;
}
.tt-bst{font-size:.7rem;color:var(--muted);margin-bottom:.4rem}
.tt-bst span{color:var(--accent2);font-weight:800}
.mini-bars{display:flex;flex-direction:column;gap:3px}
.mini-row{display:flex;align-items:center;gap:.3rem}
.mini-lbl{width:32px;font-size:.58rem;color:var(--muted);font-weight:600}
.mini-val{width:24px;font-size:.65rem;font-weight:700;text-align:right}
.mini-bg{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;border-radius:3px}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--scrollt);border-radius:3px}
</style>
</head>
<body>

<div id="loading">
  <div class="pball"><div class="pball-t"></div><div class="pball-b"></div><div class="pball-m"></div><div class="pball-c"></div></div>
  <div id="prog-text">Initializing…</div>
  <div id="prog-wrap"><div id="prog-bar"></div></div>
</div>

<div id="app" style="display:none">
  <aside id="sidebar">
    <div class="sidebar-top">
      <span id="sidebar-title">Pokémon Radial</span>
      <button id="theme-toggle" aria-label="Toggle light/dark mode">☀ Light</button>
    </div>
    <input id="search-box" type="text" placeholder="Search name or #…" autocomplete="off" aria-label="Search Pokémon by name or number">

    <div class="filter-section">
      <div class="filter-label">Generation</div>
      <div class="gen-grid" id="gen-btns"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Type</div>
      <div class="type-grid" id="type-btns"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Rarity</div>
      <div class="rarity-group" id="rarity-btns"></div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Min BST <span style="text-transform:none;font-weight:400;letter-spacing:0">(Base Stat Total)</span></div>
      <div class="slider-row">
        <input type="range" id="bst-slider" min="150" max="720" value="150" step="5">
        <span id="bst-val">150</span>
      </div>
    </div>

    <button id="reset-btn">Reset Filters</button>

    <div id="legend">
      <div class="filter-label">Dot size = BST <span style="text-transform:none;font-weight:400;letter-spacing:0">(Base Stat Total)</span></div>
      <div class="legend-size"><div class="sz-dot" style="width:4px;height:4px"></div>~200</div>
      <div class="legend-size"><div class="sz-dot" style="width:8px;height:8px"></div>~400</div>
      <div class="legend-size"><div class="sz-dot" style="width:13px;height:13px"></div>~700+</div>
    </div>
  </aside>

  <main id="chart-wrap">
    <svg id="chart" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg"></svg>
  </main>
</div>

<div id="tooltip">
  <div class="tt-head">
    <img id="tt-img" src="" alt="">
    <div><h3 id="tt-name"></h3><div class="tt-meta" id="tt-meta"></div></div>
  </div>
  <div class="tt-types" id="tt-types"></div>
  <div class="tt-bst">Total BST: <span id="tt-bst"></span></div>
  <div class="mini-bars" id="tt-stats"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════
const CX = 500, CY = 500;
const INNER_R = 78, OUTER_R = 432;
const RING_GAP = (OUTER_R - INNER_R) / 8;
const RING_R = Array.from({length:9}, (_,i) => INNER_R + i * RING_GAP);
const LABEL_R = 457, LABEL_R2 = 470;

const TYPES = ['normal','fire','water','electric','grass','ice','fighting',
               'poison','ground','flying','psychic','bug','rock','ghost',
               'dragon','dark','steel','fairy'];
const SEG_DEG = 360 / TYPES.length; // 20 degrees

const TYPE_COLORS = {
  normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',
  grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',
  ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',
  rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',
  steel:'#B8B8D0',fairy:'#EE99AC'
};

const STAT_COLORS = ['#FF5959','#F5AC78','#FAE078','#9DB7F5','#A7DB8D','#FA92B2'];
const STAT_KEYS   = ['hp','attack','defense','special-attack','special-defense','speed'];
const STAT_SHORT  = ['HP','Atk','Def','SpA','SpD','Spe'];

const GEN_RANGES = {1:[1,151],2:[152,251],3:[252,386],4:[387,493],5:[494,649],
                    6:[650,721],7:[722,809],8:[810,905],9:[906,1025]};

// Hardcoded legendary/mythical IDs
const LEGENDARY_IDS = new Set([
  144,145,146,150,243,244,245,249,250,377,378,379,380,381,382,383,384,
  480,481,482,483,484,485,486,487,488,638,639,640,641,642,643,644,645,646,
  716,717,718,772,773,785,786,787,788,789,790,791,792,800,
  888,889,890,891,892,894,895,896,897,898,905,
  1001,1002,1003,1007,1008,1009,1010
]);
const MYTHICAL_IDS = new Set([
  151,251,385,386,489,490,491,492,493,494,647,648,649,719,720,721,
  801,802,807,808,809,893,1014,1015,1016,1017,1025
]);

const CACHE_KEY = 'poke_radial_v3';
const CACHE_TTL = 24*60*60*1000;
const DEG = Math.PI/180;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let allPokemon = [];
let circleEls  = {}; // id -> SVGCircleElement
let activeGens   = new Set([1,2,3,4,5,6,7,8,9]);
let activeTypes  = new Set(TYPES);
let activeRarity = 'all'; // 'all','legendary','mythical','regular'
let minBST = 150;
let searchQ = '';

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const $ = id => document.getElementById(id);
function svgEl(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function getGen(id) {
  for(const [g,[lo,hi]] of Object.entries(GEN_RANGES)) if(id>=lo&&id<=hi) return +g;
  return 9;
}
function capitalize(s){ return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }
function bstToR(bst){ return Math.max(2.5, Math.min(7.5, 2.5 + (bst-150)/580*5)); }
function spriteUrl(id){ return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`; }

// ═══════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════
function setProgress(n, total, msg) {
  $('prog-bar').style.width = (n/total*100)+'%';
  $('prog-text').textContent = msg;
}

async function fetchJSON(url) {
  const r = await fetch(url);
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.json();
}

function slim(raw) {
  const statKeys = ['hp','attack','defense','special-attack','special-defense','speed'];
  return {
    id: raw.id,
    name: raw.name,
    types: raw.types.map(t=>t.type.name),
    stats: statKeys.map(k => { const s=raw.stats.find(x=>x.stat.name===k); return s?s.base_stat:0; }),
    height: raw.height,
    weight: raw.weight,
    bst: raw.stats.reduce((s,x)=>s+x.base_stat,0),
    abilities: raw.abilities.map(a=>({name:a.ability.name,hidden:a.is_hidden}))
  };
}

async function loadData() {
  // Cache check
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if(cached) {
      const {ts,data} = JSON.parse(cached);
      if(Date.now()-ts < CACHE_TTL) { setProgress(1025,1025,'Loaded from cache!'); return data; }
    }
  } catch(_){}

  setProgress(0,1025,'Fetching Pokémon list…');
  const list = await fetchJSON('https://pokeapi.co/api/v2/pokemon?limit=1025');
  const entries = list.results; // [{name, url}]

  const BATCH = 50;
  const results = new Array(1025).fill(null);
  let done = 0;

  async function fetchOne(i) {
    const id = i+1;
    const raw = await fetchJSON(`https://pokeapi.co/api/v2/pokemon/${id}`);
    results[i] = slim(raw);
    done++;
    setProgress(done, 1025, `Loading Pokémon… ${done}/1025`);
  }

  for(let start=0; start<1025; start+=BATCH) {
    const end = Math.min(start+BATCH, 1025);
    const ids = Array.from({length:end-start},(_,i)=>start+i);
    await Promise.all(ids.map(fetchOne));
  }

  const data = results.filter(Boolean);
  try { localStorage.setItem(CACHE_KEY, JSON.stringify({ts:Date.now(),data})); } catch(_){}
  return data;
}

// ═══════════════════════════════════════════════════
// LAYOUT COMPUTATION
// ═══════════════════════════════════════════════════
function computePositions(pokemon) {
  const ROW_GAP = 8;
  const MIN_SPACING = 8;
  // cells[gen|typeIdx] = [pokemon...]
  const cells = {};
  for(const p of pokemon) {
    const ti = TYPES.indexOf(p.types[0]);
    const key = `${p.gen}|${ti<0?0:ti}`;
    if(!cells[key]) cells[key]=[];
    cells[key].push(p);
  }
  for(const [key, group] of Object.entries(cells)) {
    const [gs,tis] = key.split('|');
    const gen = +gs, ti = +tis;
    const r = RING_R[gen-1];
    const padDeg = 1.2;
    const aStart = (ti*SEG_DEG - 90 + padDeg) * DEG;
    const aEnd   = ((ti+1)*SEG_DEG - 90 - padDeg) * DEG;
    const arcLen = r * (aEnd - aStart);
    const perRow = Math.max(1, Math.floor(arcLen / MIN_SPACING));
    const numRows = Math.min(4, Math.ceil(group.length / perRow));
    group.sort((a,b)=>a.bst-b.bst);
    group.forEach((p,i) => {
      const row = i % numRows;
      const posInRow = Math.floor(i / numRows);
      const countInRow = Math.ceil(group.length / numRows);
      const t = countInRow<=1 ? 0.5 : posInRow/(countInRow-1);
      const angle = aStart + t*(aEnd-aStart);
      const rr = r + (row-(numRows-1)/2)*ROW_GAP;
      p.px = CX + rr*Math.cos(angle);
      p.py = CY + rr*Math.sin(angle);
    });
  }
}

// ═══════════════════════════════════════════════════
// SVG RENDER
// ═══════════════════════════════════════════════════
function buildSVG() {
  const svg = $('chart');
  svg.innerHTML = '';

  // Background
  // background handled by #chart-wrap for smooth CSS transitions

  // Type wedges (faint fill)
  const wedgeG = svgEl('g',{opacity:'1'});
  TYPES.forEach((type,ti) => {
    const color = TYPE_COLORS[type];
    const aStart = (ti*SEG_DEG - 90) * DEG;
    const aEnd   = ((ti+1)*SEG_DEG - 90) * DEG;
    const r1 = INNER_R - 8, r2 = LABEL_R - 15;
    const path = wedgePath(CX,CY,r1,r2,aStart,aEnd);
    const wedge = svgEl('path',{d:path,fill:color,opacity:'.07'});
    wedgeG.appendChild(wedge);
    // Divider lines
    const lx1 = CX + r1*Math.cos(aStart), ly1 = CY + r1*Math.sin(aStart);
    const lx2 = CX + r2*Math.cos(aStart), ly2 = CY + r2*Math.sin(aStart);
    const line = svgEl('line',{x1:lx1,y1:ly1,x2:lx2,y2:ly2,stroke:'#222',
      'stroke-width':'1','stroke-opacity':'.6'});
    wedgeG.appendChild(line);
  });
  svg.appendChild(wedgeG);

  // Concentric rings
  const ringG = svgEl('g');
  RING_R.forEach((r,i) => {
    const c = svgEl('circle',{cx:CX,cy:CY,r,fill:'none',stroke:'#2a2a3e',
      'stroke-width':'1','stroke-opacity':'.8'});
    ringG.appendChild(c);
    // Gen label
    const langle = -80*DEG;
    const lx = CX + r*Math.cos(langle);
    const ly = CY + r*Math.sin(langle);
    const lt = svgEl('text',{x:lx,y:ly,fill:'#444','font-size':'9','font-family':'sans-serif',
      'text-anchor':'middle','dominant-baseline':'middle','font-weight':'700'});
    lt.textContent = `G${i+1}`;
    ringG.appendChild(lt);
  });
  svg.appendChild(ringG);

  // Type labels
  const labelG = svgEl('g');
  TYPES.forEach((type,ti) => {
    const midAngle = (ti*SEG_DEG + SEG_DEG/2 - 90) * DEG;
    const lx = CX + LABEL_R*Math.cos(midAngle);
    const ly = CY + LABEL_R*Math.sin(midAngle);
    let rot = ti*SEG_DEG + SEG_DEG/2 - 90;
    if(rot > 90 && rot < 270) rot += 180;
    const t = svgEl('text',{
      x:lx,y:ly,
      transform:`rotate(${rot},${lx},${ly})`,
      'text-anchor':'middle','dominant-baseline':'middle',
      fill:TYPE_COLORS[type],'font-size':'10.5',
      'font-weight':'800','font-family':'sans-serif',
      'letter-spacing':'0.03em'
    });
    t.textContent = type.toUpperCase();
    labelG.appendChild(t);
  });
  svg.appendChild(labelG);

  // Center decoration
  const ctr = svgEl('circle',{cx:CX,cy:CY,r:INNER_R-10,id:'ctr-circle',style:'fill:var(--surface)',
    stroke:'var(--border)','stroke-width':'1'});
  svg.appendChild(ctr);
  const ctrT = svgEl('text',{x:CX,y:CY,fill:'#666','font-size':'11','font-family':'sans-serif',
    'text-anchor':'middle','dominant-baseline':'middle'});
  ctrT.textContent = '1025';
  svg.appendChild(ctrT);
  const ctrT2 = svgEl('text',{x:CX,y:CY+13,fill:'#444','font-size':'8','font-family':'sans-serif',
    'text-anchor':'middle','dominant-baseline':'middle'});
  ctrT2.textContent = 'POKÉMON';
  svg.appendChild(ctrT2);

  // Points layer
  const pointsG = svgEl('g',{id:'points-layer'});
  for(const p of allPokemon) {
    const color = TYPE_COLORS[p.types[0]] || '#aaa';
    const r = bstToR(p.bst);
    const circle = svgEl('circle',{
      cx:p.px, cy:p.py, r,
      fill:color,
      stroke:'rgba(0,0,0,.3)',
      'stroke-width':'0.5',
      opacity:'0.92',
      class:'pt'
    });
    circle.addEventListener('mouseenter', e => showTooltip(e,p));
    circle.addEventListener('mousemove', moveTooltip);
    circle.addEventListener('mouseleave', hideTooltip);
    pointsG.appendChild(circle);
    circleEls[p.id] = circle;
  }
  svg.appendChild(pointsG);
}

function wedgePath(cx,cy,r1,r2,a1,a2) {
  const large = (a2-a1) > Math.PI ? 1 : 0;
  const x1=cx+r1*Math.cos(a1), y1=cy+r1*Math.sin(a1);
  const x2=cx+r2*Math.cos(a1), y2=cy+r2*Math.sin(a1);
  const x3=cx+r2*Math.cos(a2), y3=cy+r2*Math.sin(a2);
  const x4=cx+r1*Math.cos(a2), y4=cy+r1*Math.sin(a2);
  return `M${x1} ${y1} L${x2} ${y2} A${r2} ${r2} 0 ${large} 1 ${x3} ${y3} L${x4} ${y4} A${r1} ${r1} 0 ${large} 0 ${x1} ${y1} Z`;
}

// ═══════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════
function getRarity(p) {
  if(MYTHICAL_IDS.has(p.id)) return 'mythical';
  if(LEGENDARY_IDS.has(p.id)) return 'legendary';
  return 'regular';
}

function applyFilters() {
  const q = searchQ.toLowerCase().trim();
  for(const p of allPokemon) {
    const el = circleEls[p.id];
    if(!el) continue;
    let show = true;
    if(!activeGens.has(p.gen)) show=false;
    if(show && !p.types.some(t=>activeTypes.has(t))) show=false;
    if(show && activeRarity!=='all' && getRarity(p)!==activeRarity) show=false;
    if(show && p.bst < minBST) show=false;
    if(show && q) {
      const byName = p.name.includes(q);
      const byNum  = String(p.id)===q || String(p.id).padStart(4,'0').includes(q);
      if(!byName && !byNum) show=false;
    }
    el.classList.toggle('dim', !show);
  }
}

// ═══════════════════════════════════════════════════
// TOOLTIP
// ═══════════════════════════════════════════════════
const tip = $('tooltip');

function showTooltip(e, p) {
  $('tt-img').src = spriteUrl(p.id);
  $('tt-name').textContent = capitalize(p.name);
  $('tt-meta').textContent = `#${String(p.id).padStart(4,'0')} · Gen ${p.gen} · ${capitalize(getRarity(p))}`;
  $('tt-types').innerHTML = p.types.map(t=>
    `<span class="tbadge" style="background:${TYPE_COLORS[t]||'#888'}">${t}</span>`
  ).join('');
  $('tt-bst').textContent = p.bst;
  $('tt-stats').innerHTML = STAT_KEYS.map((k,i) => {
    const val = p.stats[i];
    const pct = Math.min(100,(val/255)*100);
    return `<div class="mini-row">
      <span class="mini-lbl">${STAT_SHORT[i]}</span>
      <span class="mini-val">${val}</span>
      <div class="mini-bg"><div class="mini-fill" style="width:${pct}%;background:${STAT_COLORS[i]}"></div></div>
    </div>`;
  }).join('');
  tip.classList.add('vis');
  moveTooltip(e);
}

function moveTooltip(e) {
  const m=14, w=tip.offsetWidth, h=tip.offsetHeight;
  let x=e.clientX+m, y=e.clientY+m;
  if(x+w>window.innerWidth-m) x=e.clientX-w-m;
  if(y+h>window.innerHeight-m) y=e.clientY-h-m;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

function hideTooltip() { tip.classList.remove('vis'); }

// ═══════════════════════════════════════════════════
// BUILD SIDEBAR CONTROLS
// ═══════════════════════════════════════════════════
function buildControls() {
  // Gen buttons
  const genG = $('gen-btns');
  for(let g=1;g<=9;g++) {
    const btn = document.createElement('button');
    btn.className='gen-btn on'; btn.textContent=`Gen ${g}`; btn.dataset.gen=g;
    btn.addEventListener('click', ()=>{
      if(activeGens.has(g)) activeGens.delete(g); else activeGens.add(g);
      btn.classList.toggle('on', activeGens.has(g));
      applyFilters();
    });
    genG.appendChild(btn);
  }
  // Type buttons
  const typeG = $('type-btns');
  for(const t of TYPES) {
    const btn = document.createElement('button');
    btn.className='type-btn on'; btn.textContent=t; btn.dataset.type=t;
    btn.style.background=TYPE_COLORS[t];
    btn.addEventListener('click', ()=>{
      if(activeTypes.has(t)) activeTypes.delete(t); else activeTypes.add(t);
      btn.classList.toggle('on', activeTypes.has(t));
      applyFilters();
    });
    typeG.appendChild(btn);
  }
  // Rarity
  const rarG = $('rarity-btns');
  for(const [val,label] of [['all','All'],['legendary','Legendary'],['mythical','Mythical'],['regular','Regular']]) {
    const btn = document.createElement('button');
    btn.className='rarity-btn'+(val==='all'?' on':''); btn.textContent=label; btn.dataset.r=val;
    btn.addEventListener('click', ()=>{
      activeRarity=val;
      rarG.querySelectorAll('.rarity-btn').forEach(b=>b.classList.toggle('on',b.dataset.r===val));
      applyFilters();
    });
    rarG.appendChild(btn);
  }
  // BST slider
  const slider = $('bst-slider');
  slider.addEventListener('input', ()=>{
    minBST=+slider.value; $('bst-val').textContent=slider.value; applyFilters();
  });
  // Search
  $('search-box').addEventListener('input', e=>{
    searchQ=e.target.value; applyFilters();
  });
  // Reset
  $('reset-btn').addEventListener('click', ()=>{
    activeGens=new Set([1,2,3,4,5,6,7,8,9]);
    activeTypes=new Set(TYPES);
    activeRarity='all'; minBST=150; searchQ='';
    $('search-box').value='';
    $('bst-slider').value=150; $('bst-val').textContent='150';
    document.querySelectorAll('.gen-btn').forEach(b=>{b.classList.add('on')});
    document.querySelectorAll('.type-btn').forEach(b=>{b.classList.add('on')});
    rarG.querySelectorAll('.rarity-btn').forEach(b=>b.classList.toggle('on',b.dataset.r==='all'));
    applyFilters();
  });
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
async function init() {
  buildControls();
  try {
    const data = await loadData();
    allPokemon = data.sort((a,b)=>a.id-b.id);
    // Annotate gen
    for(const p of allPokemon) p.gen = getGen(p.id);
    // Compute positions
    computePositions(allPokemon);
    // Render
    buildSVG();
    applyFilters();
    // Show app
    $('app').style.display='flex';
    const l = $('loading');
    l.classList.add('out');
    setTimeout(()=>l.style.display='none', 550);
  } catch(err) {
    $('prog-text').textContent='Error loading data — please refresh.';
    console.error(err);
  }
}

init();

// ── Theme toggle ──────────────────────────────────
(function(){
  const root = document.documentElement;
  const btn  = $('theme-toggle');
  const saved = localStorage.getItem('poke_theme') || 'dark';
  function applyTheme(t){
    root.setAttribute('data-theme', t);
    btn.textContent = t==='dark' ? '☀ Light' : '🌙 Dark';
    localStorage.setItem('poke_theme', t);
  }
  applyTheme(saved);
  btn.addEventListener('click', ()=>{
    applyTheme(root.getAttribute('data-theme')==='dark' ? 'light' : 'dark');
  });
})();
</script>
